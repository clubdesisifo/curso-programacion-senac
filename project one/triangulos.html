<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Laboratorio de Geometría CSS</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f6f7;
            padding: 30px;
            color: #2c3e50;
        }
        h2 { border-bottom: 2px solid #bdc3c7; padding-bottom: 10px; }
        
        /* Contenedor para alinear las formas inline */
        .contenedor {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        /* ==========================================================================
           EL PRINCIPIO ACTIVO: Base para todas las formas virtuales de bordes
           ========================================================================== */
        .forma-borde {
            width: 0;
            height: 0;
            border-style: solid;
            display: inline-block;
        }

        /* ==========================================================================
           SECCIÓN 1: TRIÁNGULOS DE DIVERSOS TAMAÑOS Y COLORES
           ========================================================================== */
        
        /* Triángulo Grande Azul - Apunta abajo */
        .triangulo-abajo-azul {
            border-width: 40px 40px 0px; /* Alto: 40px, Ancho total: 80px */
            border-color: #3498db transparent;
        }

        /* Triángulo Pequeño Rojo - Apunta arriba */
        .triangulo-arriba-rojo {
            border-width: 15px 15px 15px; /* Alto: 15px, Ancho total: 30px */
            border-color: transparent transparent #ff0000;
        }

        /* Triángulo Mediano Amarillo - Apunta a la Derecha */
        .triangulo-derecha-amarillo {
            border-width: 25px 0 25px 40px; /* Alto total: 50px, Largo: 40px */
            border-color: transparent transparent transparent #f1c40f;
        }

        /* ==========================================================================
           SECCIÓN 2: OTRAS FORMAS USANDO EL MISMO PRINCIPIO DE BORDES
           ========================================================================== */

        /* 1. EL TRAPECIO
           Si al elemento le damos un poco de ancho real (width) en lugar de 0, 
           las diagonales no se cruzan en una punta, dejando una superficie plana arriba. */
        .trapecio-purpura {
            width: 60px; /* Base superior */
            height: 0;
            border-width: 0 20px 40px; 
            border-style: solid;
            border-color: transparent transparent #9b59b6;
        }

        /* 2. EL TRIÁNGULO RECTÁNGULO (Esquina de sobre o pestaña)
           Si solo pintamos una de las esquinas laterales y dejamos el resto transparente,
           obtenemos un triángulo con un ángulo de 90 grados perfecto. */
        .esquina-gris {
            border-width: 30px 30px 0 0;
            border-color: #95a5a6 transparent transparent transparent;
        }

        /* 3. EL CORONEL / DOBLE FLECHA
           Si combinamos bordes con valores asimétricos, podemos generar figuras de flechas
           de navegación más complejas o romboides sesgados. */
        .flecha-sesgada {
            border-width: 20px 40px 20px 10px;
            border-color: transparent #1be4bc transparent transparent;
        }
    </style>
</head>
<body>

    <h2>1. Triángulos (Variaciones de Dirección, Tamaño y Color)</h2>
    <div class="contenedor">
        <div>
            <p>Grande / Abajo / Azul</p>
            <div class="forma-borde triangulo-abajo-azul"></div>
        </div>
        <div>
            <p>Pequeño / Arriba / Rojo</p>
            <div class="forma-borde triangulo-arriba-rojo"></div>
        </div>
        <div>
            <p>Mediano / Derecha / Amarillo</p>
            <div class="forma-borde triangulo-derecha-amarillo"></div>
        </div>
    </div>

    <h2>2. Otras formas derivadas del mismo principio</h2>
    <div class="contenedor">
        <div>
            <p>Trapecio (Añadiendo ancho al centro)</p>
            <div class="trapecio-purpura"></div>
        </div>
        <div>
            <p>Triángulo Rectángulo (Corte 90°)</p>
            <div class="forma-borde esquina-gris"></div>
        </div>
        <div>
            <p>Flecha de Guía Asimétrica</p>
            <div class="forma-borde flecha-sesgada"></div>
        </div>
    </div>

</body>
</html>
